<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선정평가 타이머</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nanum Gothic',sans-serif;background:#0f1117;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.page{width:100%;max-width:860px;padding:2rem;display:none;flex-direction:column;align-items:center}
.page.active{display:flex}

.session-tabs{display:flex;gap:12px;margin-bottom:2rem}
.tab{padding:16px 48px;border-radius:50px;font-size:22px;font-weight:600;border:2px solid transparent;transition:all .3s}
.tab.active-tab{background:#4f8ef7;color:#fff;border-color:#4f8ef7}
.tab.inactive-tab{background:rgba(255,255,255,.08);color:#aaa;border-color:rgba(255,255,255,.1)}
.timer-display{font-size:clamp(160px,36vw,360px);font-weight:700;letter-spacing:4px;font-variant-numeric:tabular-nums;line-height:1;transition:color .3s}
.timer-display.normal{color:#fff}
.timer-display.warning{color:#f59e0b;animation:pulse 1s infinite}
.timer-display.ended{color:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-label{margin-top:1.5rem;font-size:18px;letter-spacing:2px}
.status-label.running{color:#4ade80}
.status-label.paused{color:#f59e0b}
.status-label.stopped{color:#666}
.status-label.ended{color:#ef4444}
.session-info{margin-top:.6rem;font-size:14px;color:#555}

.status-bar{display:flex;align-items:center;margin-top:2.5rem}
.step{display:flex;flex-direction:column;align-items:center;gap:8px}
.step-dot{width:20px;height:20px;border-radius:50%;background:#2a2d3a;border:2px solid #333;transition:all .4s}
.step-dot.active{background:#4f8ef7;border-color:#4f8ef7;box-shadow:0 0 12px #4f8ef7aa}
.step-dot.done{background:#4ade80;border-color:#4ade80}
.step-dot.warn{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 12px #f59e0baa;animation:pulse 1s infinite}
.step-dot.fin{background:#ef4444;border-color:#ef4444;box-shadow:0 0 12px #ef4444aa}
.step-label{font-size:13px;color:#555;white-space:nowrap;transition:color .4s}
.step-label.active{color:#4f8ef7;font-weight:600}
.step-label.done{color:#4ade80}
.step-label.warn{color:#f59e0b;font-weight:600}
.step-label.fin{color:#ef4444;font-weight:600}
.step-line{width:60px;height:2px;background:#2a2d3a;margin-bottom:22px;transition:background .4s}
.step-line.done{background:#4ade80}

.admin-card{background:#1a1d27;border-radius:16px;padding:2rem;width:100%;max-width:520px}
.admin-title{font-size:22px;font-weight:700;margin-bottom:1.5rem;text-align:center;color:#e2e8f0}
.section-title{font-size:13px;font-weight:600;color:#888;letter-spacing:1px;text-transform:uppercase;margin:1.2rem 0 .6rem}
.time-row{display:flex;align-items:center;gap:10px;margin-bottom:.5rem}
.time-row label{font-size:14px;color:#ccc;width:80px}
.time-row input[type=number]{background:#0f1117;border:1px solid #333;border-radius:8px;color:#fff;font-size:16px;padding:6px 10px;width:70px;text-align:center}
.ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem}
.ctrl-btn{padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-start{background:#22c55e;color:#000}
.btn-pause{background:#f59e0b;color:#000}
.btn-stop{background:#ef4444;color:#fff}
.btn-reset{background:#3b82f6;color:#fff}
.btn-pres{background:#6366f1;color:#fff}
.btn-qa{background:#8b5cf6;color:#fff}
.ctrl-btn:hover{opacity:.85;transform:translateY(-1px)}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.switch-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.5rem}
.current-session{background:#1e293b;border-radius:10px;padding:12px;margin-top:1rem;text-align:center}
.cs-label{font-size:12px;color:#666;margin-bottom:4px}
.cs-time{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;color:#e2e8f0}
.cs-session{font-size:13px;margin-top:4px}
.cs-session.pres{color:#6366f1}
.cs-session.qa{color:#8b5cf6}

.login-card{background:#1a1d27;border-radius:16px;padding:2.5rem;width:100%;max-width:360px;text-align:center}
.login-card h2{font-size:20px;margin-bottom:.5rem;color:#e2e8f0}
.login-card p{font-size:14px;color:#666;margin-bottom:1.5rem}
.pw-input{width:100%;background:#0f1117;border:1px solid #333;border-radius:8px;color:#fff;font-size:18px;padding:12px;text-align:center;letter-spacing:4px;margin-bottom:1rem;outline:none}
.pw-input:focus{border-color:#4f8ef7}
.login-btn{width:100%;padding:12px;background:#4f8ef7;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.error-msg{color:#ef4444;font-size:13px;margin-top:.5rem;min-height:18px}
.nav-link{position:fixed;top:16px;right:20px;font-size:13px;color:#555;cursor:pointer;text-decoration:underline}
.nav-link:hover{color:#aaa}
.conn-dot{position:fixed;top:18px;left:20px;font-size:12px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.06)}
.conn-dot.on{color:#4ade80}
.conn-dot.off{color:#ef4444}
</style>
</head>
<body>

<div class="conn-dot" id="connDot">● 연결 중</div>
<span class="nav-link" id="navLink" onclick="toggleNav()">관리자</span>

<!-- 뷰어 -->
<div class="page active" id="viewerPage">
  <div class="session-tabs">
    <div class="tab inactive-tab" id="tab-pres">발표</div>
    <div class="tab inactive-tab" id="tab-qa">질의응답</div>
  </div>
  <div class="timer-display normal" id="timerDisplay">20:00</div>
  <div class="status-label stopped" id="statusLabel">대기 중</div>
  <div class="session-info" id="sessionInfo">발표 (20분)</div>
  <div class="status-bar">
    <div class="step"><div class="step-dot active" id="sd0"></div><div class="step-label active" id="sl0">준비</div></div>
    <div class="step-line" id="sline0"></div>
    <div class="step"><div class="step-dot" id="sd1"></div><div class="step-label" id="sl1">진행중</div></div>
    <div class="step-line" id="sline1"></div>
    <div class="step"><div class="step-dot" id="sd2"></div><div class="step-label" id="sl2">종료 1분전</div></div>
    <div class="step-line" id="sline2"></div>
    <div class="step"><div class="step-dot" id="sd3"></div><div class="step-label" id="sl3">종료</div></div>
  </div>
</div>

<!-- 로그인 -->
<div class="page" id="loginPage">
  <div class="login-card">
    <h2>관리자 로그인</h2>
    <p>비밀번호를 입력하세요</p>
    <input class="pw-input" type="password" id="pwInput" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="error-msg" id="loginErr"></div>
  </div>
</div>

<!-- 어드민 -->
<div class="page" id="adminPage">
  <div class="admin-card">
    <div class="admin-title">타이머 관리</div>
    <div class="section-title">시간 설정 (분)</div>
    <div class="time-row">
      <label>발표</label>
      <input type="number" id="presMin" value="20" min="1" max="99"/>
      <span style="font-size:13px;color:#666">분</span>
    </div>
    <div class="time-row">
      <label>질의응답</label>
      <input type="number" id="qaMin" value="15" min="1" max="99"/>
      <span style="font-size:13px;color:#666">분</span>
    </div>
    <div class="section-title">세션 전환</div>
    <div class="switch-btns">
      <button class="ctrl-btn btn-pres" onclick="switchSession('pres')">발표 세션으로</button>
      <button class="ctrl-btn btn-qa" onclick="switchSession('qa')">질의응답 세션으로</button>
    </div>
    <div class="section-title">타이머 제어</div>
    <div class="ctrl-btns">
      <button class="ctrl-btn btn-start" id="btnStart" onclick="doStart()">시작</button>
      <button class="ctrl-btn btn-pause" id="btnPause" onclick="doPause()">일시정지</button>
      <button class="ctrl-btn btn-stop"  id="btnStop"  onclick="doStop()">정지</button>
      <button class="ctrl-btn btn-reset" onclick="doReset()">초기화</button>
    </div>
    <div class="current-session">
      <div class="cs-label">현재 타이머</div>
      <div class="cs-time" id="adminTime">20:00</div>
      <div class="cs-session pres" id="adminSession">발표 세션</div>
    </div>
  </div>
</div>

<script>
const ADMIN_PW = 'kosac';
const firebaseConfig = {
  apiKey: "AIzaSyDEFL2NO7bk-Z1pvoY_XclIDvyf6FSo-Jc",
  authDomain: "eval-timer.firebaseapp.com",
  databaseURL: "https://eval-timer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "eval-timer",
  storageBucket: "eval-timer.firebasestorage.app",
  messagingSenderId: "236224321499",
  appId: "1:236224321499:web:6d34528eff0dbd82b4b9fe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const timerRef = db.ref('timer');

/*
  Firebase에 저장되는 state 구조:
  {
    session: 'pres' | 'qa',
    presTotal: 1200,   // 초
    qaTotal: 900,      // 초
    status: 'stopped' | 'running' | 'paused' | 'ended',
    baseRemaining: N,  // 시작(또는 재개) 시점의 남은 초
    startTime: N,      // 시작(또는 재개) 시각 (ms, running일 때만 유효)
    pausedRemaining: N // 일시정지 시 남은 초
  }
  
  남은 시간 계산:
  - running  → baseRemaining - floor((now - startTime) / 1000)
  - paused   → pausedRemaining
  - stopped/ended → total
*/

let fbState = {
  session: 'pres',
  presTotal: 1200,
  qaTotal: 900,
  status: 'stopped',
  baseRemaining: 1200,
  startTime: null,
  pausedRemaining: 1200
};

let tickInterval = null;
let isAdmin = false;
let currentPage = 'viewer';

// 현재 남은 초 계산 (로컬 clock 기준)
function calcRemaining() {
  if (fbState.status === 'running') {
    const elapsed = Math.floor((Date.now() - fbState.startTime) / 1000);
    return Math.max(0, fbState.baseRemaining - elapsed);
  }
  if (fbState.status === 'paused') return fbState.pausedRemaining;
  if (fbState.status === 'stopped') return fbState.session === 'pres' ? fbState.presTotal : fbState.qaTotal;
  return 0; // ended
}

// 포맷
function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// 로컬 틱 (화면 갱신용, Firebase 쓰기 없음)
function startTick() {
  stopTick();
  tickInterval = setInterval(() => {
    const rem = calcRemaining();
    renderTime(rem);
    if (rem === 0 && fbState.status === 'running') {
      fbState.status = 'ended';
      timerRef.update({status: 'ended'});
      stopTick();
      renderAll();
    }
  }, 500); // 0.5초마다 갱신해서 더 정확하게
}
function stopTick() { clearInterval(tickInterval); tickInterval = null; }

// 렌더링 - 시간 부분만
function renderTime(rem) {
  const disp = document.getElementById('timerDisplay');
  disp.textContent = fmt(rem);
  if (fbState.status === 'ended') disp.className = 'timer-display ended';
  else if (rem <= 60 && fbState.status === 'running') disp.className = 'timer-display warning';
  else disp.className = 'timer-display normal';
  document.getElementById('adminTime').textContent = fmt(rem);
}

// 렌더링 - 전체
function renderAll() {
  const rem = calcRemaining();
  renderTime(rem);

  // 상태 텍스트
  const sl = document.getElementById('statusLabel');
  const map = {running:'실행 중', paused:'일시정지', stopped:'대기 중', ended:'종료'};
  sl.textContent = map[fbState.status] || '대기 중';
  sl.className = 'status-label ' + fbState.status;

  // 탭
  document.getElementById('tab-pres').className = 'tab ' + (fbState.session==='pres' ? 'active-tab' : 'inactive-tab');
  document.getElementById('tab-qa').className   = 'tab ' + (fbState.session==='qa'   ? 'active-tab' : 'inactive-tab');
  document.getElementById('sessionInfo').textContent =
    fbState.session==='pres' ? `발표 (${Math.round(fbState.presTotal/60)}분)` : `질의응답 (${Math.round(fbState.qaTotal/60)}분)`;

  // 상태바
  document.getElementById('sl1').textContent = fbState.session==='pres' ? '발표중' : '질의응답중';
  let step = 0;
  if (fbState.status==='running' || fbState.status==='paused') step = rem<=60 ? 2 : 1;
  else if (fbState.status==='ended') step = 3;
  const dotCls = ['active','active','warn','fin'];
  for (let i=0; i<4; i++) {
    const dot = document.getElementById('sd'+i);
    const lbl = document.getElementById('sl'+i);
    if (i < step)      { dot.className='step-dot done';        lbl.className='step-label done'; }
    else if (i===step) { dot.className='step-dot '+dotCls[i];  lbl.className='step-label '+dotCls[i]; }
    else               { dot.className='step-dot';             lbl.className='step-label'; }
    if (i < 3) document.getElementById('sline'+i).className = 'step-line' + (i<step ? ' done' : '');
  }

  // 어드민
  const as = document.getElementById('adminSession');
  as.textContent = fbState.session==='pres' ? '발표 세션' : '질의응답 세션';
  as.className = 'cs-session ' + fbState.session;
  document.getElementById('presMin').value = Math.round(fbState.presTotal/60);
  document.getElementById('qaMin').value   = Math.round(fbState.qaTotal/60);
  document.getElementById('btnStart').disabled = fbState.status==='running' || fbState.status==='ended';
  document.getElementById('btnPause').disabled = fbState.status!=='running';
  document.getElementById('btnStop').disabled  = fbState.status==='stopped' || fbState.status==='ended';
}

// Firebase 리스너
timerRef.on('value', snap => {
  const data = snap.val();
  if (!data) return;
  fbState = data;
  renderAll();
  if (fbState.status === 'running') startTick();
  else stopTick();
});

// 연결 상태
db.ref('.info/connected').on('value', s => {
  const el = document.getElementById('connDot');
  el.textContent = s.val() ? '● 연결됨' : '● 연결 끊김';
  el.className = 'conn-dot ' + (s.val() ? 'on' : 'off');
});

// ── 어드민 제어 ──────────────────────────────

function doStart() {
  if (fbState.status==='running' || fbState.status==='ended') return;
  const total = fbState.session==='pres' ? fbState.presTotal : fbState.qaTotal;
  const base  = fbState.status==='paused' ? fbState.pausedRemaining : total;
  fbState.status        = 'running';
  fbState.baseRemaining = base;
  fbState.startTime     = Date.now();
  timerRef.update({
    status: 'running',
    baseRemaining: base,
    startTime: fbState.startTime
  });
  renderAll();
  startTick();
}

function doPause() {
  if (fbState.status!=='running') return;
  const rem = calcRemaining();
  fbState.status          = 'paused';
  fbState.pausedRemaining = rem;
  timerRef.update({status:'paused', pausedRemaining: rem});
  stopTick();
  renderAll();
}

function doStop() {
  fbState.status = 'stopped';
  timerRef.update({status:'stopped'});
  stopTick();
  renderAll();
}

function doReset() {
  const total = fbState.session==='pres' ? fbState.presTotal : fbState.qaTotal;
  fbState.status          = 'stopped';
  fbState.baseRemaining   = total;
  fbState.pausedRemaining = total;
  fbState.startTime       = null;
  timerRef.update({status:'stopped', baseRemaining:total, pausedRemaining:total, startTime:null});
  stopTick();
  renderAll();
}

function switchSession(s) {
  const total = s==='pres' ? fbState.presTotal : fbState.qaTotal;
  fbState.session         = s;
  fbState.status          = 'stopped';
  fbState.baseRemaining   = total;
  fbState.pausedRemaining = total;
  fbState.startTime       = null;
  timerRef.update({session:s, status:'stopped', baseRemaining:total, pausedRemaining:total, startTime:null});
  stopTick();
  renderAll();
}

document.getElementById('presMin').addEventListener('change', function() {
  const v = Math.max(1, Math.min(99, parseInt(this.value)||20));
  this.value = v;
  fbState.presTotal = v*60;
  if (fbState.session==='pres') {
    fbState.baseRemaining = v*60; fbState.pausedRemaining = v*60; fbState.status='stopped';
  }
  timerRef.update({presTotal:fbState.presTotal, baseRemaining:fbState.baseRemaining,
    pausedRemaining:fbState.pausedRemaining, status:fbState.status});
  renderAll();
});

document.getElementById('qaMin').addEventListener('change', function() {
  const v = Math.max(1, Math.min(99, parseInt(this.value)||15));
  this.value = v;
  fbState.qaTotal = v*60;
  if (fbState.session==='qa') {
    fbState.baseRemaining = v*60; fbState.pausedRemaining = v*60; fbState.status='stopped';
  }
  timerRef.update({qaTotal:fbState.qaTotal, baseRemaining:fbState.baseRemaining,
    pausedRemaining:fbState.pausedRemaining, status:fbState.status});
  renderAll();
});

// ── 페이지 전환 ──────────────────────────────

function showPage(name) {
  ['viewerPage','loginPage','adminPage'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id===name+'Page');
  });
  currentPage = name;
  document.getElementById('navLink').textContent = name==='viewer' ? '관리자' : '뷰어로 돌아가기';
}

function toggleNav() {
  if (currentPage==='viewer') showPage('login');
  else { isAdmin=false; showPage('viewer'); }
}

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    document.getElementById('loginErr').textContent = '';
    document.getElementById('pwInput').value = '';
    isAdmin = true;
    // Firebase에 데이터 없으면 초기값 저장
    timerRef.once('value', snap => {
      if (!snap.val()) {
        timerRef.set(fbState);
      }
      showPage('admin');
      renderAll();
    });
  } else {
    document.getElementById('loginErr').textContent = '비밀번호가 올바르지 않습니다.';
  }
}

// 초기 렌더
renderAll();
</script>
</body>
</html>
